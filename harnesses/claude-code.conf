# Claude Code.
# Skills:    .claude/skills/<name>/SKILL.md
# Subagents: .claude/agents/<name>.md
# Project context: CLAUDE.md (Claude Code also reads AGENTS.md, so we emit both).
SKILLS_DIR=".claude/skills"
AGENTS_DIR=".claude/agents"
INSTRUCTIONS_FILE="CLAUDE.md"
ALSO_AGENTS_MD="true"
AGENT_FILE_EXT="md"
# CONNECTIONS_DIR is intentionally unset: Claude Code configures MCP servers through
# its own settings (.mcp.json / project config), not a markdown connections/ dir.
# The canonical connections/ files remain the source of truth for that wiring.
