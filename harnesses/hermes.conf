# Hermes Agent (NousResearch).
# Skills:   Hermes auto-discovers SKILL.md skills; bundled/global skills live in ~/.hermes/skills/.
#           We project the project-scoped copies under .hermes/skills/<name>/ to namespace them
#           alongside Hermes' other dotfiles; Hermes also reads a bare top-level skills/ if you
#           prefer that — adjust SKILLS_DIR to taste.
# Agents:   Hermes has no file-based subagent registry — it spawns subagents dynamically via
#           delegate_task. The per-agent manifests below are projected as reference/context only;
#           reference them from AGENTS.md so the dynamic delegator knows the roster.
# Project context: Hermes auto-loads AGENTS.md (also .hermes.md, CLAUDE.md, .cursorrules).
SKILLS_DIR=".hermes/skills"
AGENTS_DIR=".hermes/agents"
INSTRUCTIONS_FILE="AGENTS.md"
ALSO_AGENTS_MD="false"
AGENT_FILE_EXT="md"
# CONNECTIONS_DIR intentionally unset: Hermes configures MCP servers in ~/.hermes/config.yaml
# (mcp_servers:), not a markdown connections/ dir. The canonical connections/ files remain the
# source of truth for that wiring.
