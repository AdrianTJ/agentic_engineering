# Google Antigravity (agentic IDE).
# Skills:   <project>/.agents/skills/<name>/SKILL.md   (SKILL.md-compatible; same shape we author)
# Agents:   Antigravity centralizes personas in a single <project>/.agents/agents.md. Our
#           generator emits one file per agent, so we project them under .agents/agents/<name>.md
#           as reference manifests — fold them into .agents/agents.md if you want Antigravity to
#           treat them as first-class personas.
# Project context: AGENTS.md at the project root (its standing-instructions file, like CLAUDE.md).
SKILLS_DIR=".agents/skills"
AGENTS_DIR=".agents/agents"
INSTRUCTIONS_FILE="AGENTS.md"
ALSO_AGENTS_MD="false"
AGENT_FILE_EXT="md"
# CONNECTIONS_DIR intentionally unset: Antigravity wires external systems through MCP servers
# configured in its own settings, not a markdown connections/ dir. The canonical connections/
# files remain the source of truth for that wiring.
